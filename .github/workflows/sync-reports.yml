name: Sync reporting aggregate

# Keeps the Supabase reporting aggregate fresh by running scripts/backfill.ts.
# - Every 30 min: INCREMENTAL — per-day pulls over the trailing window (~3MB/day, ~1 min total).
# - Daily 04:17 UTC: FULL reconcile — one 382MB pull rebuilds everything (catches edits to older rows).
# Both are cheap enough to stay within free Action minutes. (A Vercel pg_cron → /api/sync path can do
# 2-min incremental for free instead — see supabase/migrations/0001_agent_facts.sql.)

on:
  schedule:
    - cron: "*/30 * * * *"   # incremental
    - cron: "17 4 * * *"     # daily full reconcile
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode"
        default: incremental
        type: choice
        options: [incremental, full]

concurrency:
  group: sync-reports
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Sync Supabase aggregate
        env:
          NODE_OPTIONS: --max-old-space-size=6144
          METABASE_SITE_URL: ${{ secrets.METABASE_SITE_URL }}
          METABASE_SECRET_KEY: ${{ secrets.METABASE_SECRET_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          METABASE_RAW_DATE_PARAM: activity_day
        run: |
          MODE="${{ github.event.inputs.mode || 'incremental' }}"
          # the daily cron forces a full reconcile regardless of manual input
          if [ "${{ github.event.schedule }}" = "17 4 * * *" ]; then MODE=full; fi
          echo "Running sync mode=$MODE"
          if [ "$MODE" = "full" ]; then npx tsx scripts/backfill.ts --full; else npx tsx scripts/backfill.ts; fi
