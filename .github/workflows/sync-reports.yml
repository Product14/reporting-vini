name: Sync reporting aggregate

# Keeps the Supabase reporting aggregate fresh by running scripts/backfill.ts (ClickHouse-direct).
# - Every 30 min: INCREMENTAL — watermark-driven; re-aggregates only the (team,day) partitions changed
#   since the last run (back to the oldest changed day, capped at MAX_LOOKBACK_DAYS).
# - Daily 04:17 UTC: FULL — bounded reconcile over the last FULL_RECONCILE_DAYS (never an all-time scan).
# ClickHouse is reached over HTTPS via repo secrets; prod Vercel has no ClickHouse access, so the ETL
# lives here (not in a Vercel route).

on:
  schedule:
    - cron: "0 * * * *"      # incremental — hourly (was */30; a ~1-2 min run whose
                             # hot window is the last 3 days is plenty fresh for a
                             # reporting aggregate that feeds daily digests, and it
                             # halves GitHub Actions minutes)
    - cron: "17 4 * * *"     # daily full reconcile (120d) — catches older changed days
  workflow_dispatch:
    inputs:
      mode:
        description: "Sync mode"
        default: incremental
        type: choice
        options: [incremental, full]

concurrency:
  group: sync-reports
  # cancel-in-progress: true is SAFE now that each run checkpoints the watermark right
  # after the hot window (see backfill.ts): a run cancelled mid-flight has already
  # committed recent-day freshness, and the delta is idempotent, so killing a straggler
  # for the newer run never loses progress. Prevents the pile-up that produced the
  # overlap-cancellations during the 07-14 stall. The daily full reconcile (~25 min)
  # finishes well before the next hourly incremental, so it is not cut short.
  cancel-in-progress: true

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Sync Supabase aggregate
        env:
          # --expose-gc lets backfill.ts free heap between chunks (a long reconcile never accumulates).
          # CHUNK_DAYS=3 (was 7): peak heap scales with rows-scanned-per-chunk, and the busiest windows
          # hit ~200k spine rows per 7 days — enough to OOM-kill the run mid-backlog (the 2026-07-14
          # stall). Halving the scan span roughly halves peak memory so no single chunk — hot window or
          # backlog — approaches the 8 GB ceiling. More chunks = more round-trips, but each is cheap and
          # the 60-min timeout has ample room. Pairs with the watermark checkpoint (progress is saved
          # after the hot window regardless), making an OOM-driven stall structurally impossible.
          NODE_OPTIONS: --max-old-space-size=8192 --expose-gc
          CHUNK_DAYS: "3"
          # ClickHouse creds — reuse the CH_* repo secrets the sibling refresh-metrics.yml already carries.
          CLICKHOUSE_HOST: ${{ secrets.CH_HOST }}
          CLICKHOUSE_PORT: ${{ secrets.CH_PORT }}
          CLICKHOUSE_USER: ${{ secrets.CH_USER }}
          CLICKHOUSE_PASSWORD: ${{ secrets.CH_PASSWORD }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          # Optional: an admin-scoped Spyne API token. When set, backfill.ts re-buckets activity_day by
          # each rooftop's store-local day (working-hours timezone) instead of UTC. Unset → UTC bucketing.
          SPYNE_API_TOKEN: ${{ secrets.SPYNE_API_TOKEN }}
          SPYNE_API_BASE: ${{ secrets.SPYNE_API_BASE }}
        run: |
          MODE="${{ github.event.inputs.mode || 'incremental' }}"
          # the daily cron forces a full reconcile regardless of manual input
          if [ "${{ github.event.schedule }}" = "17 4 * * *" ]; then MODE=full; fi
          echo "Running sync mode=$MODE"
          if [ "$MODE" = "full" ]; then npx tsx scripts/backfill.ts --full; else npx tsx scripts/backfill.ts; fi
